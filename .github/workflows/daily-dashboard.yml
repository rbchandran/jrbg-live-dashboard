name: JRBG Daily Dashboard → GitHub Pages

on:
  # Every day at 7:00 AM IST (1:30 AM UTC)
  schedule:
    - cron: '30 1 * * *'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      region:
        description: 'Region to build'
        required: false
        default: 'KL'
        type: choice
        options:
          - KL
          - TN
          - ALL

permissions:
  contents: write
  pages: write
  id-token: write

env:
  MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Step 1: Checkout ──
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # ── Step 2: Python setup ──
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # ── Step 3: Query MotherDuck & Build Dashboard ──
      - name: 🦆 Query MotherDuck & Build Dashboard
        run: |
          echo "🕐 Build started at $(TZ=Asia/Kolkata date '+%Y-%m-%d %I:%M %p IST')"
          
          REGION="${{ github.event.inputs.region || 'KL' }}"
          echo "📍 Region: $REGION"
          
          python build_dashboard.py --region $REGION
          
          echo "✅ Build complete"

      # ── Step 4: Verify output ──
      - name: ✅ Verify dashboard
        run: |
          if [ ! -f "docs/index.html" ]; then
            echo "❌ Dashboard not generated!"
            exit 1
          fi
          SIZE=$(stat -c%s "docs/index.html")
          echo "📄 Dashboard size: $((SIZE/1024)) KB"
          if [ "$SIZE" -lt 10000 ]; then
            echo "❌ File too small — likely build error"
            exit 1
          fi
          echo "✅ Dashboard verified"

      # ── Step 5: Deploy to GitHub Pages ──
      - name: 🚀 Deploy to GitHub Pages
        run: |
          git config user.name "JRBG Dashboard Bot"
          git config user.email "dashboard@jrbg.auto"
          
          # Commit the updated dashboard
          git add docs/
          git diff --cached --quiet || {
            TIMESTAMP=$(TZ=Asia/Kolkata date '+%Y-%m-%d %I:%M %p IST')
            git commit -m "📊 Dashboard refreshed: $TIMESTAMP"
            git push
          }
          
          echo "🌐 Dashboard live at: https://${GITHUB_REPOSITORY_OWNER}.github.io/$(echo $GITHUB_REPOSITORY | cut -d/ -f2)/"

      # ── Step 6: Alert on failure ──
      - name: 🚨 Alert on failure
        if: failure()
        run: |
          echo "❌ Dashboard build FAILED at $(TZ=Asia/Kolkata date)"
          echo "Check logs: https://github.com/$GITHUB_REPOSITORY/actions"
          # Future: add Slack/WhatsApp webhook here
