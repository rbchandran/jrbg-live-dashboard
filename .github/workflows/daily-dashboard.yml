name: JRBG Daily Dashboard

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install duckdb==1.5.3 pandas python-dateutil
      - run: python build_dashboard.py --region KL
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      - run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@jrbg.auto"
          git add docs/
          git diff --cached --quiet || git commit -m "Dashboard updated $(date)"
          git push
